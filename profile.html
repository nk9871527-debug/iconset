<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IconScope | Profile</title>

    <!-- Google Fonts: Outfit (Modern, Geometric) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        :root {
            --primary: #4effbf;
            --secondary: #6366f1;
            --accent: #ec4899;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glow: 0 0 20px rgba(99, 102, 241, 0.3);
            --font-main: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #eef2ff 100%);
            background-attachment: fixed;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 24px;
            color: #1e293b;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo img {
            width: 32px;
            height: 32px;
        }

        .header-menu {
            display: flex;
            gap: 20px;
        }

        .header-menu a {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s;
        }

        .header-menu a:hover {
            color: var(--secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Dropdown Menu */
        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            width: 200px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            z-index: 1001;
            transform-origin: top right;
            animation: scaleIn 0.2s ease;
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-menu a {
            padding: 10px 16px;
            text-decoration: none;
            color: #334155;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .dropdown-menu a:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--secondary);
        }

        .dropdown-menu hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 5px 0;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            padding: 120px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        .profile-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            color: white;
            font-size: 48px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .profile-name {
            font-size: 28px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 8px;
        }

        .profile-email {
            font-size: 16px;
            color: #64748b;
        }

        .profile-stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 40px 0;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--secondary);
            display: block;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            font-weight: 500;
            margin-top: 4px;
        }

        .action-btns {
            display: flex;
            justify-content: center;
            gap: 16px;
        }

        .btn {
            padding: 10px 24px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 15px;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--dark);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
        }

        .btn-outline {
            background: transparent;
            border: 2px solid #e2e8f0;
            color: #475569;
        }

        .btn-outline:hover {
            border-color: #cbd5e1;
            background: #f8fafc;
            color: #1e293b;
        }

        /* --- Footer --- */
        footer {
            background: white;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 14px;
        }

        /* Dark Mode */
        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
        }

        body.dark-mode .app-header {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
        }

        body.dark-mode .logo {
            color: #f1f5f9;
        }

        body.dark-mode .header-menu a {
            color: #cbd5e1;
        }

        body.dark-mode .icon-btn {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            color: #94a3b8;
        }

        body.dark-mode .dropdown-menu {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .dropdown-menu a {
            color: #cbd5e1;
        }

        body.dark-mode .dropdown-menu a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        body.dark-mode .profile-stats {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .profile-name {
            color: white;
        }

        body.dark-mode .profile-email,
        body.dark-mode .stat-label {
            color: #94a3b8;
        }

        body.dark-mode .btn-outline {
            border-color: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
        }

        body.dark-mode .btn-outline:hover {
            border-color: rgba(255, 255, 255, 0.2);
            color: white;
            background: rgba(255, 255, 255, 0.05);
        }

        body.dark-mode footer {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.08);
        }

        /* Edit Form Styles */
        .edit-form {
            display: none;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
            margin: 0 auto 30px;
            text-align: left;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .form-label {
            font-size: 14px;
            font-weight: 500;
            color: #64748b;
        }

        .form-input {
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            font-size: 16px;
            font-family: 'Outfit', sans-serif;
            outline: none;
            transition: all 0.2s;
        }

        .form-input:focus {
            border-color: var(--secondary);
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        body.dark-mode .edit-form {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .form-label {
            color: #94a3b8;
        }

        body.dark-mode .form-input {
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        body.dark-mode .form-input:focus {
            border-color: #818cf8;
            box-shadow: 0 0 0 3px rgba(129, 140, 248, 0.1);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <nav class="app-header">
        <a href="index.html" class="logo">
            <img src="images/bg.png" alt="IconScope Brand">
            IconScope
        </a>
        <div class="header-menu">
            <a href="index.html">Explore</a>
            <a href="designers.html">Designers</a>
            <a href="pricing.html">Pricing</a>
        </div>
        <div class="header-right">
            <div class="icon-btn" id="notificationBtn"><i class="fa-regular fa-bell"></i></div>
            <div class="icon-btn" id="darkModeToggle"><i class="fa-solid fa-moon"></i></div>
            <div class="icon-btn" id="menuBtn" style="position: relative;">
                <i class="fa-solid fa-bars"></i>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                    <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
                    <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
                    <a href="privacy.html"><i class="fa-solid fa-shield-halved"></i> Privacy</a>
                    <hr>
                    <a href="login.html" id="logoutBtn" style="color: #ef4444;"><i
                            class="fa-solid fa-right-from-bracket"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <div class="profile-header">
            <div class="profile-avatar" id="avatarInitial">U</div>
            <h1 class="profile-name" id="userName">User Name</h1>
            <p class="profile-email" id="userEmail">user@example.com</p>
        </div>

        <div class="profile-stats">
            <div class="stat-item">
                <span class="stat-value">0</span>
                <span class="stat-label">Downloads</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">Basic</span>
                <span class="stat-label">Plan</span>
            </div>
            <div class="stat-item">
                <span class="stat-value">Active</span>
                <span class="stat-label">Status</span>
            </div>
        </div>

        <div class="action-btns" id="displayBtns">
            <button class="btn btn-primary" id="editBtn">Edit Profile</button>
            <button class="btn btn-outline" onclick="window.location.href='settings.html'">Settings</button>
        </div>

        <!-- Download History Section -->
        <div class="downloads-section" style="margin-top: 50px;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="font-size: 20px; font-weight: 700;">My Downloads</h2>
                <button id="clearHistoryBtn"
                    style="background: none; border: none; color: #ef4444; cursor: pointer; font-size: 13px; font-weight: 500; display: none;">Clear
                    History</button>
            </div>

            <div class="grid" id="downloadsGrid"
                style="display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 20px;">
                <!-- Downloads will appear here -->
                <div id="emptyState"
                    style="grid-column: 1/-1; text-align: center; padding: 40px; color: #94a3b8; background: white; border-radius: 20px; border: 1px dashed #e2e8f0;">
                    <i class="fa-solid fa-cloud-arrow-down"
                        style="font-size: 30px; margin-bottom: 10px; opacity: 0.5;"></i>
                    <p>No downloads yet. Start exploring!</p>
                    <a href="all icons.html"
                        style="display: inline-block; margin-top: 10px; color: var(--secondary); text-decoration: none; font-weight: 600; font-size: 14px;">Browse
                        Icons &rarr;</a>
                </div>
            </div>
        </div>

        <!-- Edit Form (Hidden by default) -->
        <div class="edit-form" id="editForm">
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="editNameInput">
            </div>
            <div class="form-group">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-input" id="editEmailInput">
            </div>
            <div class="action-btns" style="margin-top: 10px;">
                <button class="btn btn-primary" id="saveBtn">Save Changes</button>
                <button class="btn btn-outline" id="cancelBtn">Cancel</button>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 IconScope. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Retrieve User Data
            const userStr = localStorage.getItem('iconscopeUser');
            let currentUser = userStr ? JSON.parse(userStr) : null;

            function updateUI() {
                if (currentUser) {
                    document.getElementById('userName').textContent = currentUser.name || 'User';
                    document.getElementById('userEmail').textContent = currentUser.email || 'No email';
                    document.getElementById('avatarInitial').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
                }
            }
            updateUI();

            // Edit Profile Logic
            const editBtn = document.getElementById('editBtn');
            const editForm = document.getElementById('editForm');
            const displayBtns = document.getElementById('displayBtns');
            const cancelBtn = document.getElementById('cancelBtn');
            const saveBtn = document.getElementById('saveBtn');
            const nameInput = document.getElementById('editNameInput');
            const emailInput = document.getElementById('editEmailInput');
            const profileHeader = document.querySelector('.profile-header');
            const profileStats = document.querySelector('.profile-stats');

            if (editBtn) {
                editBtn.addEventListener('click', () => {
                    // Pre-fill inputs
                    if (currentUser) {
                        nameInput.value = currentUser.name || '';
                        emailInput.value = currentUser.email || '';
                    }
                    // Toggle visibility
                    editForm.style.display = 'flex';
                    displayBtns.style.display = 'none';
                    profileStats.style.display = 'none'; // Hide stats to focus on form
                });
            }

            if (cancelBtn) {
                cancelBtn.addEventListener('click', () => {
                    editForm.style.display = 'none';
                    displayBtns.style.display = 'flex';
                    profileStats.style.display = 'flex';
                });
            }

            if (saveBtn) {
                saveBtn.addEventListener('click', () => {
                    const newName = nameInput.value.trim();
                    const newEmail = emailInput.value.trim();

                    if (newName && newEmail) {
                        // Update object
                        if (!currentUser) currentUser = {};
                        currentUser.name = newName;
                        currentUser.email = newEmail;

                        // Save to localStorage
                        localStorage.setItem('iconscopeUser', JSON.stringify(currentUser));
                        localStorage.setItem('iconscopeLoggedIn', 'true'); // Ensure logged in state

                        // Update UI
                        updateUI();

                        // Hide form
                        editForm.style.display = 'none';
                        displayBtns.style.display = 'flex';
                        profileStats.style.display = 'flex';

                        // Optional: Show success feedback
                        // alert("Profile updated!"); 
                    } else {
                        alert("Please fill in all fields.");
                    }
                });
            }

            // --- Download History Logic ---
            const downloadsGrid = document.getElementById('downloadsGrid');
            const emptyState = document.getElementById('emptyState');
            const clearHistoryBtn = document.getElementById('clearHistoryBtn');
            const downloadCountEl = document.querySelector('.stat-value'); // First stat value is downloads

            function renderDownloads() {
                const downloads = JSON.parse(localStorage.getItem('iconscopeDownloads') || '[]');

                // Update Count Stats
                if (downloadCountEl) {
                    downloadCountEl.textContent = downloads.length;
                }

                if (downloads.length === 0) {
                    downloadsGrid.innerHTML = '';
                    downloadsGrid.appendChild(emptyState);
                    emptyState.style.display = 'block';
                    if (clearHistoryBtn) clearHistoryBtn.style.display = 'none';
                    return;
                }

                if (clearHistoryBtn) clearHistoryBtn.style.display = 'block';
                emptyState.style.display = 'none';
                downloadsGrid.innerHTML = ''; // Clear current

                downloads.forEach(icon => {
                    const card = document.createElement('div');
                    // reusing standard icon-card styles from other pages if available, 
                    // but since profile might not have all CSS, adding inline styles for safety matches standard styling
                    card.className = 'icon-card-profile';
                    card.style.cssText = `
                        background: white; 
                        border-radius: 16px; 
                        padding: 15px; 
                        display: flex; 
                        flex-direction: column; 
                        align-items: center; 
                        gap: 10px; 
                        box-shadow: 0 4px 20px rgba(0,0,0,0.05);
                        position: relative;
                        transition: transform 0.2s;
                    `;

                    card.innerHTML = `
                        <div style="width: 50px; height: 50px; display: flex; align-items: center; justify-content: center;">
                            <img src="${icon.src}" alt="${icon.name}" style="max-width: 100%; max-height: 100%;">
                        </div>
                        <span style="font-size: 12px; font-weight: 600; color: #334155; text-transform: uppercase;">${icon.name}</span>
                        <a href="${icon.src}" download style="position: absolute; top: 10px; right: 10px; color: #cbd5e1; font-size: 14px;"><i class="fa-solid fa-download"></i></a>
                    `;

                    // Hover effect
                    card.onmouseenter = () => { card.style.transform = 'translateY(-5px)'; card.style.boxShadow = '0 10px 25px rgba(0,0,0,0.1)'; };
                    card.onmouseleave = () => { card.style.transform = 'translateY(0)'; card.style.boxShadow = '0 4px 20px rgba(0,0,0,0.05)'; };

                    downloadsGrid.appendChild(card);
                });
            }

            // Initial Render
            renderDownloads();

            // Clear History
            if (clearHistoryBtn) {
                clearHistoryBtn.addEventListener('click', () => {
                    if (confirm('Are you sure you want to clear your download history?')) {
                        localStorage.removeItem('iconscopeDownloads');
                        // Update user count too? Maybe keep lifetime count but clear list. 
                        // For now, let's sync count to list length for consistency.
                        // Or if we want lifetime count, we shouldn't decrease it. 
                        // But user typically expects "clearing history" to clear the view.

                        // Let's just clear the list view but keep the "stat" if we were tracking lifetime separately.
                        // But my tracker updates "downloads" count based on increments in 'iconscopeUser'.
                        // Here I am displaying list length.
                        // So I will just clear the list.

                        renderDownloads();
                    }
                });
            }

            // Dark Mode Logic
            const toggle = document.getElementById('darkModeToggle');
            const icon = toggle.querySelector('i');
            const body = document.body;

            if (localStorage.getItem('iconscopeDarkMode') === 'true') {
                body.classList.add('dark-mode');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }

            if (toggle) {
                toggle.addEventListener('click', () => {
                    body.classList.toggle('dark-mode');
                    const isDark = body.classList.contains('dark-mode');
                    localStorage.setItem('iconscopeDarkMode', isDark);

                    if (isDark) {
                        icon.classList.remove('fa-moon');
                        icon.classList.add('fa-sun');
                    } else {
                        icon.classList.remove('fa-sun');
                        icon.classList.add('fa-moon');
                    }
                });
            }

            // Menu Dropdown Logic
            const menuBtn = document.getElementById('menuBtn');
            const dropdownMenu = document.getElementById('dropdownMenu');

            if (menuBtn && dropdownMenu) {
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdownMenu.classList.toggle('show');
                });

                document.addEventListener('click', (e) => {
                    if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        dropdownMenu.classList.remove('show');
                    }
                });
            }

            // Logout Logic
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('iconscopeLoggedIn');
                    localStorage.removeItem('iconscopeUser');
                });
            }
        });
    </script>
</body>

</html>
