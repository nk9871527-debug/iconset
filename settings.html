<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IconScope | Settings</title>

    <!-- Google Fonts: Outfit (Modern, Geometric) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        :root {
            --primary: #4effbf;
            --secondary: #6366f1;
            --accent: #ec4899;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glow: 0 0 20px rgba(99, 102, 241, 0.3);
            --font-main: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #eef2ff 100%);
            background-attachment: fixed;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 24px;
            color: #1e293b;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo img {
            width: 32px;
            height: 32px;
        }

        .header-menu {
            display: flex;
            gap: 20px;
        }

        .header-menu a {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s;
        }

        .header-menu a:hover {
            color: var(--secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Dropdown Menu */
        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            width: 200px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            z-index: 1001;
            transform-origin: top right;
            animation: scaleIn 0.2s ease;
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-menu a {
            padding: 10px 16px;
            text-decoration: none;
            color: #334155;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .dropdown-menu a:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--secondary);
        }

        .dropdown-menu hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 5px 0;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* --- Main Content --- */
        main {
            flex: 1;
            padding: 120px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }

        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 40px;
            text-align: center;
        }

        .settings-group {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
        }

        .settings-header {
            font-size: 18px;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .settings-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .settings-item:last-child {
            border-bottom: none;
        }

        .setting-info h4 {
            font-size: 16px;
            font-weight: 600;
            color: #334155;
            margin-bottom: 4px;
        }

        .setting-info p {
            font-size: 14px;
            color: #64748b;
        }

        /* Toggle Switch */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #cbd5e1;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked+.slider {
            background-color: var(--secondary);
        }

        input:checked+.slider:before {
            transform: translateX(22px);
        }

        /* --- Footer --- */
        footer {
            background: white;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 14px;
        }

        /* Dark Mode */
        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
        }

        body.dark-mode .app-header {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
        }

        body.dark-mode .logo {
            color: #f1f5f9;
        }

        body.dark-mode .header-menu a {
            color: #cbd5e1;
        }

        body.dark-mode .icon-btn {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.08);
            color: #94a3b8;
        }

        body.dark-mode .dropdown-menu {
            background: rgba(30, 41, 59, 0.9);
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode .dropdown-menu a {
            color: #cbd5e1;
        }

        body.dark-mode .dropdown-menu a:hover {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        body.dark-mode h1,
        body.dark-mode .settings-header {
            color: #f1f5f9;
        }

        body.dark-mode .settings-group {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        body.dark-mode .setting-info h4 {
            color: #e2e8f0;
        }

        body.dark-mode .setting-info p {
            color: #94a3b8;
        }

        body.dark-mode .settings-item {
            border-color: rgba(255, 255, 255, 0.1);
        }

        body.dark-mode footer {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.08);
        }
    </style>
</head>

<body>

    <!-- Header -->
    <nav class="app-header">
        <a href="index.html" class="logo">
            <img src="images/bg.png" alt="IconScope Brand">
            IconScope
        </a>
        <div class="header-menu">
            <a href="index.html">Explore</a>
            <a href="designers.html">Designers</a>
            <a href="pricing.html">Pricing</a>
        </div>
        <div class="header-right">
            <div class="icon-btn" id="notificationBtn"><i class="fa-regular fa-bell"></i></div>
            <div class="icon-btn" id="darkModeToggle"><i class="fa-solid fa-moon"></i></div>
            <div class="icon-btn" id="menuBtn" style="position: relative;">
                <i class="fa-solid fa-bars"></i>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                    <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
                    <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
                    <a href="privacy.html"><i class="fa-solid fa-shield-halved"></i> Privacy</a>
                    <hr>
                    <a href="login.html" id="logoutBtn" style="color: #ef4444;"><i
                            class="fa-solid fa-right-from-bracket"></i> Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <h1>Settings</h1>

        <div class="settings-group">
            <div class="settings-header">
                <i class="fa-solid fa-desktop"></i> Appearance
            </div>
            <div class="settings-item">
                <div class="setting-info">
                    <h4>Dark Mode</h4>
                    <p>Switch between light and dark themes</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="settingsDarkMode">
                    <span class="slider"></span>
                </label>
            </div>
        </div>

        <div class="settings-group">
            <div class="settings-header">
                <i class="fa-regular fa-bell"></i> Notifications
            </div>
            <div class="settings-item">
                <div class="setting-info">
                    <h4>Push Notifications</h4>
                    <p>Receive updates about new icons</p>
                </div>
                <label class="switch">
                    <input type="checkbox" id="settingsNotifications">
                    <span class="slider"></span>
                </label>
            </div>
            <div class="settings-item">
                <div class="setting-info">
                    <h4>Email Updates</h4>
                    <p>Get weekly newsletters</p>
                </div>
                <label class="switch">
                    <input type="checkbox" checked>
                    <span class="slider"></span>
                </label>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 IconScope. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Retrieve Preferences
            const isDark = localStorage.getItem('iconscopeDarkMode') === 'true';
            const isNotify = localStorage.getItem('iconscopeNotifications') === 'true';

            const darkToggle = document.getElementById('settingsDarkMode');
            const notifyToggle = document.getElementById('settingsNotifications');

            if (darkToggle) darkToggle.checked = isDark;
            if (notifyToggle) notifyToggle.checked = isNotify;

            // Header Dark Mode Toggle
            const headerToggle = document.getElementById('darkModeToggle');
            const headerIcon = headerToggle.querySelector('i');
            const body = document.body;

            function applyTheme(dark) {
                if (dark) {
                    body.classList.add('dark-mode');
                    headerIcon.classList.remove('fa-moon');
                    headerIcon.classList.add('fa-sun');
                } else {
                    body.classList.remove('dark-mode');
                    headerIcon.classList.remove('fa-sun');
                    headerIcon.classList.add('fa-moon');
                }
            }

            applyTheme(isDark);

            // Sync Header Toggle
            if (headerToggle) {
                headerToggle.addEventListener('click', () => {
                    const currentDark = body.classList.contains('dark-mode');
                    const newDark = !currentDark;
                    applyTheme(newDark);
                    localStorage.setItem('iconscopeDarkMode', newDark);
                    if (darkToggle) darkToggle.checked = newDark;
                });
            }

            // Sync Settings Page Toggle
            if (darkToggle) {
                darkToggle.addEventListener('change', (e) => {
                    const newDark = e.target.checked;
                    applyTheme(newDark);
                    localStorage.setItem('iconscopeDarkMode', newDark);
                });
            }

            if (notifyToggle) {
                notifyToggle.addEventListener('change', (e) => {
                    localStorage.setItem('iconscopeNotifications', e.target.checked);
                    // Trigger storage event for other tabs if they listen
                });
            }

            // Menu Dropdown Logic
            const menuBtn = document.getElementById('menuBtn');
            const dropdownMenu = document.getElementById('dropdownMenu');

            if (menuBtn && dropdownMenu) {
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdownMenu.classList.toggle('show');
                });

                document.addEventListener('click', (e) => {
                    if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        dropdownMenu.classList.remove('show');
                    }
                });
            }

            // Logout Logic
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('iconscopeLoggedIn');
                    localStorage.removeItem('iconscopeUser');
                });
            }
        });
    </script>
</body>

</html>
