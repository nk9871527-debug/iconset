<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IconScope | Meet the Designers</title>

    <!-- Google Fonts: Outfit (Modern, Geometric) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <style>
        :root {
            --primary: #4effbf;
            --secondary: #6366f1;
            --accent: #ec4899;
            --dark: #0f172a;
            --light: #f8fafc;
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glow: 0 0 20px rgba(99, 102, 241, 0.3);
            --font-main: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-main);
        }

        body {
            background: linear-gradient(135deg, #f0f4ff 0%, #eef2ff 100%);
            background-attachment: fixed;
            color: var(--dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .app-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.03);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 800;
            font-size: 24px;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            letter-spacing: -0.5px;
        }

        .logo img {
            width: 32px;
            height: 32px;
        }

        .header-menu {
            display: flex;
            gap: 20px;
        }

        .header-menu a {
            text-decoration: none;
            color: #64748b;
            font-weight: 500;
            font-size: 15px;
            transition: color 0.3s;
        }

        .header-menu a:hover {
            color: var(--secondary);
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .icon-btn {
            width: 46px;
            height: 46px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #64748b;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.25);
            color: var(--secondary);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        /* Dark Mode Styles */
        body.dark-mode {
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: #f1f5f9;
        }

        body.dark-mode .app-header,
        body.dark-mode footer {
            background: rgba(30, 41, 59, 0.7);
            border-color: rgba(255, 255, 255, 0.08);
            color: #f1f5f9;
            backdrop-filter: blur(16px);
        }

        body.dark-mode .icon-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #94a3b8;
        }

        body.dark-mode .icon-btn:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            border-color: rgba(255, 255, 255, 0.2);
        }

        body.dark-mode .cta-btn {
            background: #3b82f6;
            /* Lighter blue for dark mode visibility */
            color: white;
        }

        /* Main Content */
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 120px 20px;
        }

        .hero h1 {
            font-size: clamp(3rem, 6vw, 4.5rem);
            line-height: 1.1;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(300deg, #3b82f6, #8b5cf6, #ec4899);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientShift 6s ease infinite;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .hero p {
            font-size: 1.2rem;
            color: #64748b;
            max-width: 600px;
            margin: 0 auto 40px;
        }

        .cta-btn {
            background: var(--dark);
            color: white;
            padding: 12px 24px;
            border-radius: 99px;
            font-weight: 600;
            font-size: 16px;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            display: inline-block;
        }

        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        /* Footer */
        footer {
            background: white;
            padding: 40px 20px;
            text-align: center;
            border-top: 1px solid #e2e8f0;
            color: #94a3b8;
            font-size: 14px;
        }

        /* Dropdown Menu */
        .dropdown-menu {
            position: absolute;
            top: 60px;
            right: 0;
            width: 200px;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            z-index: 1001;
            transform-origin: top right;
            animation: scaleIn 0.2s ease;
        }

        .dropdown-menu.show {
            display: flex;
        }

        .dropdown-menu a {
            padding: 10px 16px;
            text-decoration: none;
            color: #334155;
            font-size: 14px;
            font-weight: 500;
            border-radius: 10px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: all 0.2s;
        }

        .dropdown-menu a:hover {
            background: rgba(99, 102, 241, 0.1);
            color: var(--secondary);
        }

        .dropdown-menu hr {
            border: none;
            border-top: 1px solid #e2e8f0;
            margin: 5px 0;
        }

        @keyframes scaleIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>

<body>

    <!-- Header -->
    <nav class="app-header">
        <a href="index.html" class="logo">
            <img src="images/bg.png" alt="IconScope Brand">
            IconScope
        </a>
        <div class="header-menu">
            <a href="index.html">Explore</a>
            <a href="designers.html" style="color: var(--secondary);">Designers</a>
            <a href="pricing.html">Pricing</a>
        </div>
        <div class="header-right">
            <div class="icon-btn" id="notificationBtn"><i class="fa-regular fa-bell"></i></div>
            <div class="icon-btn" id="darkModeToggle"><i class="fa-solid fa-moon"></i></div>
            <div class="icon-btn" id="menuBtn" style="position: relative;">
                <i class="fa-solid fa-bars"></i>
                <div class="dropdown-menu" id="dropdownMenu">
                    <a href="profile.html"><i class="fa-regular fa-user"></i> Profile</a>
                    <a href="settings.html"><i class="fa-solid fa-gear"></i> Settings</a>
                    <a href="contact.html"><i class="fa-solid fa-envelope"></i> Contact</a>
                    <a href="privacy.html"><i class="fa-solid fa-shield-halved"></i> Privacy</a>
                    <hr>
                    <a href="login.html" id="logoutBtn" style="color: #ef4444;"><i
                            class="fa-solid fa-right-from-bracket"></i>
                        Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main>
        <section class="hero">
            <h1>Meet the Designers</h1>
            <p>We are curating a list of top-tier designers who contribute to our extensive library. Stay tuned!</p>
            <p><strong>Coming Soon</strong></p>
            <a href="index.html" class="cta-btn">Go Back Home</a>
        </section>
    </main>

    <!-- Footer -->
    <footer>
        <p>&copy; 2026 IconScope. All rights reserved.</p>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Dark Mode Logic
            const toggle = document.getElementById('darkModeToggle');
            const icon = toggle.querySelector('i');
            const body = document.body;

            // Check saved preference
            if (localStorage.getItem('iconscopeDarkMode') === 'true') {
                body.classList.add('dark-mode');
                icon.classList.remove('fa-moon');
                icon.classList.add('fa-sun');
            }

            if (toggle) {
                toggle.addEventListener('click', () => {
                    body.classList.toggle('dark-mode');
                    const isDark = body.classList.contains('dark-mode');
                    localStorage.setItem('iconscopeDarkMode', isDark);

                    if (isDark) {
                        icon.classList.remove('fa-moon');
                        icon.classList.add('fa-sun');
                    } else {
                        icon.classList.remove('fa-sun');
                        icon.classList.add('fa-moon');
                    }
                });
            }
            // Logout Logic
            const logoutBtn = document.getElementById('logoutBtn');
            if (logoutBtn) {
                logoutBtn.addEventListener('click', () => {
                    localStorage.removeItem('iconscopeLoggedIn');
                    localStorage.removeItem('iconscopeUser');
                });
            }

            // Menu Dropdown Logic
            const menuBtn = document.getElementById('menuBtn');
            const dropdownMenu = document.getElementById('dropdownMenu');

            if (menuBtn && dropdownMenu) {
                menuBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    dropdownMenu.classList.toggle('show');
                });

                // Close on click outside
                document.addEventListener('click', (e) => {
                    if (!menuBtn.contains(e.target) && !dropdownMenu.contains(e.target)) {
                        dropdownMenu.classList.remove('show');
                    }
                });
            }
        });
    </script>

</body>

</html>
